<style>

  :root{
    --paper:#EFF2F1;--card:#FFFFFF;--ink:#20303A;--ink-soft:#5C6E76;--ink-faint:#93A2A8;

  }
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 80px;}

  .hero{position:relative;margin:0 -16px 14px;padding:22px 20px 18px;
    background:linear-gradient(180deg,#DCE7E6 0%,#E9EEED 62%,var(--paper) 100%);
    border-bottom:1px solid var(--line);overflow:hidden;}
  .hero .eyebrow{font-size:12px;letter-spacing:.28em;color:var(--trail);font-weight:700;text-transform:uppercase;margin:0 0 6px;}
  .hero h1{font-family:var(--serif);font-weight:900;font-size:clamp(25px,6.6vw,36px);line-height:1.08;margin:0 0 4px;}
  .hero .sub{font-size:13.5px;color:var(--ink-soft);margin:0;}
  .ascent{margin-top:12px;}.ascent svg{display:block;width:100%;height:auto;}
  .ascent-stats{display:flex;align-items:baseline;gap:10px;margin-top:8px;flex-wrap:wrap;}
  .pct{font-family:var(--serif);font-weight:900;font-size:32px;color:var(--peak);line-height:1;}
  .pct-label{font-size:13px;color:var(--ink-soft);}
  .pct-frac{font-size:12.5px;color:var(--ink-faint);margin-left:auto;}

  .controls{position:sticky;top:0;z-index:20;background:var(--paper);padding:10px 0 8px;margin-bottom:4px;border-bottom:1px solid var(--line-soft);}
  .seg{display:flex;background:#E2E8E7;border-radius:10px;padding:3px;gap:2px;}
  .seg button{flex:1;font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink-soft);border:0;background:transparent;padding:8px 8px;border-radius:8px;cursor:pointer;}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .filters{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
  select{font-family:var(--sans);font-size:13px;color:var(--ink);border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 10px;}
  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .toggle input{accent-color:var(--trail);width:15px;height:15px;}
  .reset{margin-left:auto;font-size:12.5px;color:var(--ink-faint);background:none;border:0;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}

  .weekdiv{display:flex;align-items:center;gap:10px;margin:22px 2px 4px;}
  .weekdiv .wn{font-family:var(--serif);font-weight:900;font-size:15px;color:var(--trail);}
  .weekdiv .wr{font-size:12.5px;color:var(--ink-faint);}
  .weekdiv .gbar{height:4px;border-radius:99px;background:var(--line);overflow:hidden;flex:1;max-width:120px;margin-left:auto;}
  .weekdiv .gbar i{display:block;height:100%;background:var(--done);width:0;transition:width .3s;}

  .day{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px 10px;margin:9px 0;box-shadow:var(--shadow);}
  .day.is-sun{background:#F6F4EE;border-color:#E8E0D0;}
  .day-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
  .day-date{font-family:var(--serif);font-weight:700;font-size:15.5px;}
  .day-dow{font-size:12.5px;color:var(--ink-faint);}
  .day-prog{margin-left:auto;font-size:12px;color:var(--ink-faint);}

  .task{display:flex;gap:11px;align-items:flex-start;padding:9px 2px;cursor:pointer;border-top:1px solid var(--line-soft);}
  .task:first-of-type{border-top:0;}
  .box{flex:none;width:21px;height:21px;border-radius:6px;border:2px solid var(--ink-faint);margin-top:1px;display:grid;place-items:center;transition:all .15s;}
  .task.done .box{background:var(--done);border-color:var(--done);}
  .box svg{width:12px;height:12px;opacity:0;transform:scale(.5);transition:all .15s;}
  .task.done .box svg{opacity:1;transform:scale(1);}
  .body{flex:1;min-width:0;}
  .ttext{font-size:14px;color:var(--ink);font-weight:500;}
  .task.done .ttext{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:#A9C7B7;}
  .note{font-size:11.5px;color:var(--ink-faint);margin-top:3px;line-height:1.4;}
  .meta-row{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;}
  .chip{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;color:#fff;}
  .chip.muted{background:#E7ECEB;color:var(--ink-soft);}
  .chip.opt{background:#F1ECE2;color:var(--peak);border:1px solid #E8DCC4;}
  .habit{font-size:11px;color:var(--ink-faint);margin-top:8px;padding-top:7px;border-top:1px dashed var(--line);}
  .habit.arch{color:var(--archive);font-weight:600;}

  /* subject groups */
  .group{margin:16px 0 0;}
  .group-head{display:flex;align-items:center;gap:10px;margin:0 2px 8px;}
  .group-title{font-family:var(--serif);font-weight:700;font-size:17px;margin:0;}
  .group-meta{font-size:12.5px;color:var(--ink-faint);margin-left:auto;}
  .badge{font-family:var(--serif);font-weight:900;font-size:13px;color:#fff;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:none;}
  .gbar{height:4px;border-radius:99px;background:var(--line);overflow:hidden;flex:1;max-width:120px;}
  .gbar i{display:block;height:100%;width:0;transition:width .3s;}
  .scard{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow);cursor:pointer;}
  .scard.done{background:var(--done-bg);border-color:#D2E4DA;}

  /* archive */
  .ritual{background:linear-gradient(135deg,#8A6A3B,#A07F4C);color:#FBF6EC;border-radius:14px;padding:15px 16px;margin:6px 0 14px;box-shadow:var(--shadow);}
  .ritual h3{font-family:var(--serif);margin:0 0 6px;font-size:16px;}
  .ritual p{margin:0;font-size:12.5px;line-height:1.65;color:#F0E6D2;}
  .acard{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow);cursor:pointer;}
  .acard.done{background:var(--archive-bg);border-color:#E4D9C2;}
  .acard .box{border-radius:6px;}
  .acard.done .box{background:var(--archive);border-color:var(--archive);}
  .when{font-size:11px;color:var(--archive);background:var(--archive-bg);border:1px solid #E8DCC4;padding:2px 8px;border-radius:99px;font-weight:600;}
  .acard.done .when{opacity:.65;}

  .empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:40px 0;}
  .foot{margin-top:28px;padding:18px;border-radius:14px;background:linear-gradient(135deg,#23535E,#2E6E7E);color:#EAF2F1;box-shadow:var(--shadow);}
  .foot p{margin:0 0 8px;font-size:13px;line-height:1.65;color:#DCEAE8;}
  .foot .line{font-family:var(--serif);font-weight:700;font-size:17px;color:#fff;margin:6px 0 0;}
  .foot .by{font-size:11.5px;color:#9FC2BF;margin-top:10px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>

    </div>
  </div>

    <p>这份作业不仅是知识的巩固，更是迈向初三的第一步。每天踏实一点，每周日把成果整理归位，假期结束时你会带着满满的底气走进考场。</p>

  </footer>
</div>

/* ---------- state ---------- */
const KEY='bhyx-summer-daily-2026-v1';
let state={}, view='day';
function load(){try{const v=localStorage.getItem(KEY);if(v)state=JSON.parse(v);}catch(e){state={};}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

/* ---------- date helpers ---------- */
const WEEKS=[
  {n:1,s:'2026-07-06',e:'2026-07-12',r:'7/6 – 7/12'},
  {n:2,s:'2026-07-13',e:'2026-07-19',r:'7/13 – 7/19'},
  {n:3,s:'2026-07-20',e:'2026-07-26',r:'7/20 – 7/26'},
  {n:4,s:'2026-07-27',e:'2026-08-02',r:'7/27 – 8/2'},
  {n:5,s:'2026-08-03',e:'2026-08-09',r:'8/3 – 8/9'},
  {n:6,s:'2026-08-10',e:'2026-08-16',r:'8/10 – 8/16'},
];
const DOW=['周日','周一','周二','周三','周四','周五','周六'];
function dateParts(iso){const dt=new Date(iso+'T00:00:00');return{m:dt.getMonth()+1,day:dt.getDate(),dow:dt.getDay()};}

/* ---------- UI ---------- */
function setView(v){
  view=v;
  vDay.classList.toggle('on',v==='day');
  vSubject.classList.toggle('on',v==='subject');
  vArchive.classList.toggle('on',v==='archive');
  render();
}
function fillFilter(){const sel=subjFilter;Object.entries(SUBJECTS).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.name;sel.appendChild(o);});}
function checkSvg(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.2 4.2L19 7" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}

function taskRow(t,showWeek){
  const done=!!state[t.id],sub=SUBJECTS[t.s];
  let chips=`<span class="chip" style="background:${sub.color}">${sub.name}</span>`;
  if(t.o)chips+=`<span class="chip opt">选做 / 视情况</span>`;
  return `<div class="task ${done?'done':''}" onclick="toggle('${t.id}')">
    <div class="box">${checkSvg()}</div>
    <div class="body"><div class="ttext">${t.t}</div>${t.n?`<div class="note">${t.n}</div>`:''}
    <div class="meta-row">${chips}</div></div></div>`;
}

function renderDaily(tasks){
  let html='';
  WEEKS.forEach(wk=>{
    const wt=tasks.filter(t=>t.d>=wk.s&&t.d<=wk.e);
    if(!wt.length)return;
    const all=TASKS.filter(t=>t.d>=wk.s&&t.d<=wk.e),done=all.filter(t=>state[t.id]).length;
    const label=wk.n===6?`第6周 · 收尾 + 返校准备`:`第${wk.n}周`;
    html+=`<div class="weekdiv"><span class="wn">${label}</span><span class="wr">${wk.r}</span>
      <div class="gbar"><i style="width:${Math.round(done/all.length*100)}%"></i></div></div>`;
    const days=[...new Set(wt.map(t=>t.d))];
    days.forEach(d=>{
      const dt=dateParts(d),dr=wt.filter(t=>t.d===d);
      const allD=TASKS.filter(t=>t.d===d),doneD=allD.filter(t=>state[t.id]).length;
      const isSun=dt.dow===0;
      const habit=isSun?`<div class="habit arch">整理归档日 · 见「归档清单」，把本周成果归位</div>`
                       :`<div class="habit">今日习惯 · 锻炼≥30分钟 · 英语听读15分钟</div>`;
      html+=`<div class="day ${isSun?'is-sun':''}">
        <div class="day-head"><span class="day-date">${dt.m}月${dt.day}日</span>
        <span class="day-dow">${DOW[dt.dow]}</span><span class="day-prog">${doneD}/${allD.length}</span></div>
        ${dr.map(t=>taskRow(t)).join('')}${habit}</div>`;
    });
  });
  return html;
}

function renderSubject(tasks){
  let html='';
  Object.keys(SUBJECTS).forEach(k=>{
    const inS=tasks.filter(t=>t.s===k);if(!inS.length)return;
    const all=TASKS.filter(t=>t.s===k),done=all.filter(t=>state[t.id]).length,sub=SUBJECTS[k];
    html+=`<section class="group"><div class="group-head">
      <span class="badge" style="background:${sub.color}">${sub.name[0]}</span>
      <h2 class="group-title">${sub.name}</h2>
      <div class="gbar"><i style="width:${Math.round(done/all.length*100)}%;background:${sub.color}"></i></div>
      <span class="group-meta">${done}/${all.length}</span></div>`;
    html+=inS.map(t=>{
      const dn=!!state[t.id],dt=dateParts(t.d);
      let chips=`<span class="chip muted">${dt.m}/${dt.day}</span>`;
      if(t.o)chips+=`<span class="chip opt">选做</span>`;
      return `<div class="scard ${dn?'done':''}" onclick="toggle('${t.id}')"><div class="box">${checkSvg()}</div>
        <div class="body"><div class="ttext">${t.t}</div>${t.n?`<div class="note">${t.n}</div>`:''}
        <div class="meta-row">${chips}</div></div></div>`;
    }).join('');
    html+=`</section>`;
  });
  return html;
}

function renderArchive(){
  const subjF=subjFilter.value,hide=hideDone.checked;
  let items=ARCHIVE.filter(a=>!subjF||a.s===subjF);if(hide)items=items.filter(a=>!state[a.id]);
  const total=ARCHIVE.filter(a=>!a.o).length,done=ARCHIVE.filter(a=>!a.o&&state[a.id]).length;
  let html=`<div class="ritual"><h3>每周日 = 整理归档日</h3>
    <p>① 把本周完成的练习卷 / 试卷归入对应学科文件夹；② 更新英语错题本、补全各科笔记；③ 在下方清单勾选「已归档」；④ 英语三本 + 原版书单独放进「返校上交袋」。</p></div>`;
  const groups=[['submit','返校日上交（单独打包）'],['file','完成即归档（随完成整理）']];
  groups.forEach(([g,title])=>{
    const list=items.filter(a=>a.g===g);if(!list.length)return;
    html+=`<section class="group"><div class="group-head">
      <h2 class="group-title">${title}</h2></div>`;
    html+=list.map(a=>{
      const dn=!!state[a.id],sub=SUBJECTS[a.s];
      let chips=`<span class="chip" style="background:${sub.color}">${sub.name}</span><span class="when">${a.w}</span>`;
      if(a.o)chips+=`<span class="chip opt">视情况</span>`;
      return `<div class="acard ${dn?'done':''}" onclick="toggle('${a.id}')"><div class="box">${checkSvg()}</div>
        <div class="body"><div class="ttext">${a.t}</div>${a.n?`<div class="note">${a.n}</div>`:''}
        <div class="meta-row">${chips}</div></div></div>`;
    }).join('');
    html+=`</section>`;
  });
  return `<div style="display:flex;align-items:baseline;gap:8px;margin:14px 2px 2px">
      <span style="font-family:var(--serif);font-weight:900;font-size:15px;color:var(--archive)">归档进度</span>
      <span style="font-size:12.5px;color:var(--ink-faint);margin-left:auto">${done}/${total} 项已归档</span></div>`+html;
}

function render(){
  filterBar.style.display='flex';
  const subjF=subjFilter.value,hide=hideDone.checked;
  let html;
  if(view==='archive'){html=renderArchive();}
  else{
    let tasks=TASKS.filter(t=>!subjF||t.s===subjF);if(hide)tasks=tasks.filter(t=>!state[t.id]);
    html=view==='day'?renderDaily(tasks):renderSubject(tasks);
  }
  list.innerHTML=html||'<div class="empty">没有符合条件的项目 — 试试取消筛选。</div>';
  updateProgress();
}

function updateProgress(){
  const req=TASKS.filter(t=>!t.o),done=req.filter(t=>state[t.id]).length,pct=req.length?done/req.length:0;
  pctNum.textContent=Math.round(pct*100)+'%';
  pctFrac.textContent=done+' / '+req.length+' 项（不含选做）';
  const trail=document.getElementById('trailFg'),climber=document.getElementById('climber'),len=trail.getTotalLength();
  trail.style.strokeDasharray=len;trail.style.strokeDashoffset=len*(1-pct);
  const p=trail.getPointAtLength(len*pct);climber.setAttribute('transform',`translate(${p.x},${p.y})`);
}
function toggle(id){if(state[id])delete state[id];else state[id]=true;save();render();}
function resetAll(){if(!confirm('确定清空所有勾选（含归档）吗？此操作无法撤销。'))return;state={};save();render();}

(function(){fillFilter();load();render();})();
